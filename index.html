<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Strive Math · Grade 7 Curriculum</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,600;1,700&family=Inconsolata:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
/* ─── STRIVE BRAND DESIGN TOKENS ─── */
:root {
  /* Strive exact brand colours (from screenshot) */
  --orange:  #FF6635;
  --orange2: #FFB39A;
  --purple:  #7058FF;
  --pink:    #FF4F84;
  --amber:   #FFA41C;
  --green:   #B0EB33;
  --blue:    #2C81ED;
  --navy:    #0F1574;
  --navy-lt: #878AB9;

  /* Strive signature rainbow */
  --rainbow:     linear-gradient(to right, #FFA41C, #FF4F84, #7058FF, #2C81ED, #B0EB33);
  --rainbow-cta: linear-gradient(to right, #FFA41C, #FF4F84, #7058FF);
  --coral-pink:  linear-gradient(to right, #FE6636, #FF4F84 40%, #7058FF 80%);

  /* LIGHT surface (Strive brand — light only mode) */
  --bg-top:   #FAFAFA;
  --surface:  rgba(255,255,255,0.80);
  --surface2: rgba(255,255,255,0.90);
  --surface3: #FFFFFF;
  --border:   rgba(15,21,116,0.08);
  --border2:  rgba(15,21,116,0.15);

  /* Text — Strive light mode */
  --ink:  #0F1574;
  --ink2: #575863;
  --ink3: #878AB9;
  --ink4: #B1B1C2;

  /* Strive shadows */
  --sh-sm: 0 1px 4px rgba(15,21,116,0.06);
  --sh:    0px 8px 30.26px rgba(15,21,116,0.07);
  --sh-lg: 0px 15px 30px rgba(0,0,0,0.10);
  --sh-btn: 0px 4px 11px rgba(0,0,0,0.20);

  --r: 16px; --r-lg: 24px; --r-pill: 100px;

  --font:    'Jost', sans-serif;
  --display: 'Jost', sans-serif;
  --mono:    'Inconsolata', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: var(--font);
  background: var(--bg-top);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
}

/* ─── LIGHT BACKGROUND ─── */
.bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background: #FAFAFA;
}
/* Soft Strive colour blobs — very subtle on white */
.bg-canvas::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 55% 45% at 0% 0%,   rgba(255,102,53,0.08)  0%, transparent 55%),
    radial-gradient(ellipse 50% 40% at 100% 5%,  rgba(112,88,255,0.07)  0%, transparent 55%),
    radial-gradient(ellipse 45% 40% at 100% 95%, rgba(44,129,237,0.07)  0%, transparent 55%),
    radial-gradient(ellipse 40% 35% at 0% 95%,   rgba(255,79,132,0.06)  0%, transparent 50%),
    radial-gradient(ellipse 30% 30% at 50% 50%,  rgba(255,164,28,0.04)  0%, transparent 50%);
}
/* Noise grain — barely visible on white */
.bg-canvas::after {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0.018;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* dot grid — light navy tint on white */
.dot-grid {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background-image: radial-gradient(circle, rgba(15,21,116,0.07) 1px, transparent 1px);
  background-size: 28px 28px;
}

/* ─── FLOATING SYMBOLS — behind everything, visible on light bg ─── */
.sym-layer {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.sym {
  position: absolute;
  font-family: var(--mono);
  font-weight: 700;
  opacity: 0;
  animation: floatUp linear infinite;
  user-select: none;
}
@keyframes floatUp {
  0%   { opacity: 0;   transform: translateY(0)      rotate(0deg)  scale(0.85); }
  10%  { opacity: 1; }
  88%  { opacity: 0.6; }
  100% { opacity: 0;   transform: translateY(-90vh)  rotate(22deg) scale(1.05); }
}

/* ─── PAGE ─── */
.page { max-width: 980px; margin: 0 auto; padding: 0 24px 120px; position: relative; z-index: 1; }

/* ─── NAV ─── */
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 22px 0 22px;
  position: sticky; top: 0; z-index: 100;
  background: rgba(250,250,250,0.88);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(15,21,116,0.07);
  margin: 0 -24px;
  padding-left: 24px; padding-right: 24px;
}
.logo { height: 26px; display: block; }
.nav-right { display: flex; align-items: center; gap: 8px; }
.nav-pill {
  font-size: 11px; font-weight: 700; letter-spacing: 0.07em;
  text-transform: uppercase; border-radius: 100px; padding: 5px 14px;
  background: rgba(255,255,255,0.08); border: 1.5px solid rgba(255,255,255,0.15);
  color: var(--ink3); box-shadow: var(--sh-sm);
}
.nav-pill-hot {
  background: linear-gradient(135deg, var(--coral), var(--amber));
  color: #fff; border-color: transparent;
  box-shadow: 0 2px 14px rgba(232,66,10,0.3);
}

/* ─── GRADE BADGE ─── */
.grade-badge {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--navy);
  border: none;
  border-radius: 14px;
  padding: 7px 16px 7px 8px;
  box-shadow: var(--sh-btn);
  transition: box-shadow 0.2s;
}
.grade-badge:hover { box-shadow: 0 6px 20px rgba(15,21,116,0.3); }
.grade-badge-num {
  font-family: var(--font);
  font-size: 26px;
  font-weight: 800;
  line-height: 1;
  background: var(--rainbow-cta);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  padding: 2px 4px;
}
.grade-badge-info {
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.grade-badge-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.7);
  line-height: 1;
}
.grade-badge-sub {
  font-size: 10px;
  font-weight: 500;
  color: rgba(255,255,255,0.45);
  letter-spacing: 0.03em;
  line-height: 1;
}

/* ─── HERO ─── */
.hero {
  padding: 28px 0 20px;
  text-align: center;
  position: relative;
}
.hero-tag {
  display: inline-flex; align-items: center; gap: 7px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
  text-transform: uppercase;
  background: rgba(112,88,255,0.08);
  border: 1.5px solid rgba(112,88,255,0.22);
  border-radius: var(--r-pill); padding: 4px 14px; margin-bottom: 14px;
  color: var(--purple);
  font-family: var(--font);
}
.hero-tag-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--rainbow-cta);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.4;transform:scale(1.6);} }

.hero-h1 {
  font-family: var(--font);
  font-size: clamp(28px, 4vw, 42px);
  font-weight: 800;
  line-height: 1.05;
  letter-spacing: -0.02em;
  margin-bottom: 10px;
}
.h1-line1 { color: var(--navy); display: inline; font-weight: 800; }
.h1-line2 {
  display: inline;
  background: var(--coral-pink);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-style: italic;
  font-weight: 700;
  padding-bottom: 0.08em;
}

.hero-sub {
  font-size: 13px; color: var(--ink3);
  max-width: 460px; margin: 0 auto 16px;
  line-height: 1.6; font-weight: 400;
}

/* stat pills row */
.hero-pills {
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
}
.h-stat {
  display: flex; align-items: center; gap: 6px;
  background: #fff;
  border: 1.5px solid rgba(15,21,116,0.09);
  border-radius: var(--r-pill);
  padding: 5px 14px;
  box-shadow: var(--sh-sm);
}
.h-stat-num {
  font-family: var(--display);
  font-size: 16px; font-weight: 800; line-height: 1;
}
.h-stat-lbl {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.05em; text-transform: uppercase;
  color: var(--ink4);
}

/* ─── DOMAIN FILTER STRIP ─── */
.filter-strip {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 0 12px;
  overflow-x: auto;
  scrollbar-width: none;
}
.filter-strip::-webkit-scrollbar { display: none; }
.fs-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 16px; border-radius: var(--r-pill);
  border: 1.5px solid rgba(15,21,116,0.12);
  background: #fff;
  color: var(--ink3);
  font-family: var(--font); font-size: 12px; font-weight: 600;
  cursor: pointer; white-space: nowrap;
  box-shadow: var(--sh-sm);
  transition: all 0.18s ease;
  letter-spacing: 0.01em;
}
.fs-btn:hover { transform: translateY(-1px); box-shadow: var(--sh); color: var(--navy); border-color: rgba(15,21,116,0.22); }
.fs-btn.on { color: #fff; border-color: transparent; box-shadow: var(--sh-btn); transform: translateY(-1px); }
.fs-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; transition: transform 0.18s; }
.fs-btn:hover .fs-dot, .fs-btn.on .fs-dot { transform: scale(1.3); }
.fs-count { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 5px; background: rgba(0,0,0,0.08); }

/* ─── ROADMAP ─── */
.roadmap {
  position: relative;
  padding-left: 72px;
}

/* vertical gradient spine */
.rm-spine {
  position: absolute;
  left: 26px;
  top: 30px;
  bottom: 30px;
  width: 3px;
  border-radius: 2px;
  background: linear-gradient(
    180deg,
    #FFA41C 0%,
    #FF4F84 25%,
    #7058FF 50%,
    #2C81ED 75%,
    #B0EB33 100%
  );
  opacity: 0.6;
}

/* connecting lines from node to spine */
.rm-item { position: relative; margin-bottom: 10px; }
.rm-item::before {
  content: '';
  position: absolute;
  left: -44px;
  top: 32px;
  width: 38px;
  height: 1.5px;
  background: rgba(255,255,255,0.15);
  z-index: 1;
}

/* NODE */
.rm-node {
  position: absolute;
  left: -60px;
  top: 15px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--display);
  font-size: 13px; font-weight: 800;
  border: 2.5px solid;
  /* Solid bg so spine and connector lines are fully hidden behind node */
  background-clip: padding-box;
  z-index: 10;
  transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.22s;
  cursor: pointer;
}
.rm-item:hover .rm-node { transform: scale(1.18) rotate(-5deg); }

/* CARD */
.rm-card {
  background: #fff;
  border: 1px solid rgba(15,21,116,0.08);
  border-radius: var(--r-lg);
  box-shadow: var(--sh);
  overflow: hidden;
  transition: box-shadow 0.22s, border-color 0.22s, transform 0.22s;
}
.rm-card:hover { box-shadow: var(--sh-lg); border-color: rgba(15,21,116,0.14); transform: translateY(-1px); }
.rm-card.open  { box-shadow: var(--sh-lg); border-color: rgba(15,21,116,0.14); }

/* card top stripe */
.rm-card-stripe {
  height: 3px;
  width: 100%;
}

/* card header */
.rm-card-hdr {
  display: flex; align-items: center; gap: 14px;
  padding: 18px 22px;
  cursor: pointer; user-select: none;
  transition: background 0.15s;
}
.rm-card-hdr:hover { background: rgba(15,21,116,0.025); }

.rm-card-icon {
  width: 42px; height: 42px;
  border-radius: 13px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 16px; font-weight: 900;
  flex-shrink: 0;
}
.rm-card-info { flex: 1; min-width: 0; }
.rm-card-name {
  font-family: var(--display);
  font-size: 16px; font-weight: 700; color: var(--navy);
  margin-bottom: 2px; letter-spacing: -0.01em;
}
.rm-card-desc { font-size: 11.5px; color: var(--ink4); }

.rm-card-right { display: flex; align-items: center; gap: 9px; flex-shrink: 0; }
.rm-code {
  font-family: var(--mono); font-size: 10px; font-weight: 700;
  padding: 3px 10px; border-radius: 7px; border: 1.5px solid;
  letter-spacing: 0.05em;
}
.rm-ct {
  font-size: 11px; color: var(--ink4);
  background: rgba(0,0,0,0.05);
  border: 1.5px solid var(--border);
  border-radius: 7px; padding: 3px 10px; font-weight: 600;
}
.chev {
  width: 28px; height: 28px; border-radius: 9px;
  background: rgba(15,21,116,0.05);
  border: 1.5px solid rgba(15,21,116,0.10);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
}
.rm-card.open .chev { background: var(--navy); border-color: var(--navy); }
.chev svg { transition: transform 0.28s cubic-bezier(0.4,0,0.2,1); color: var(--ink3); }
.rm-card.open .chev svg { transform: rotate(180deg); color: #fff; }

/* ─── ACCORDION OUTCOME ROWS ─── */
.acc-outcomes-wrap {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.48s cubic-bezier(0.4,0,0.2,1);
}
.acc-outcomes-inner {
  border-top: 1px solid rgba(15,21,116,0.07);
  padding: 8px 0 12px;
}
.acc-row {
  display: flex;
  align-items: center;
  gap: 0;
  cursor: pointer;
  transition: background 0.15s;
  position: relative;
}
.acc-row:hover { background: rgba(15,21,116,0.025); }
.acc-row.is-open { background: rgba(15,21,116,0.025); }
.acc-row-left {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 22px;
  flex: 1;
  min-width: 0;
}
.acc-row-num {
  font-family: var(--mono);
  font-size: 10px; font-weight: 700;
  width: 24px; height: 24px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  letter-spacing: 0;
}
.acc-row-title {
  font-size: 13px; font-weight: 600;
  color: var(--ink2); line-height: 1.4;
  flex: 1;
  transition: color 0.15s;
}
.acc-row:hover .acc-row-title,
.acc-row.is-open .acc-row-title { color: var(--navy); }
.acc-row-toggle {
  width: 22px; height: 22px;
  border-radius: 6px;
  border: 1.5px solid rgba(15,21,116,0.12);
  background: rgba(15,21,116,0.04);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-right: 18px;
  transition: all 0.2s;
  position: relative;
}
.acc-row.is-open .acc-row-toggle {
  background: var(--navy);
  border-color: var(--navy);
}
.acc-row-toggle::before,
.acc-row-toggle::after {
  content: '';
  position: absolute;
  border-radius: 1px;
  transition: all 0.22s;
}
.acc-row-toggle::before { width: 9px; height: 1.5px; background: var(--ink3); }
.acc-row-toggle::after  { width: 1.5px; height: 9px; background: var(--ink3); }
.acc-row.is-open .acc-row-toggle::before { background: #fff; }
.acc-row.is-open .acc-row-toggle::after  { background: #fff; transform: rotate(90deg); opacity: 0; }

/* row separator */
.acc-row + .acc-row { border-top: 1px solid rgba(15,21,116,0.05); }

/* detail panel per row */
.acc-det {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.38s cubic-bezier(0.4,0,0.2,1);
}
.acc-det-in {
  padding: 14px 22px 18px 58px;
  border-top: 1px solid rgba(15,21,116,0.06);
  background: rgba(15,21,116,0.02);
}
.acc-det-desc {
  font-size: 12.5px; color: var(--ink2);
  line-height: 1.65; margin-bottom: 12px;
  max-width: 660px;
}
.acc-det-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media(max-width:600px){ .acc-det-cols { grid-template-columns: 1fr; } }
.acc-det-col-label {
  font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--ink4); margin-bottom: 7px;
}

/* shimmer animation for first open */
@keyframes rowIn { from{opacity:0;transform:translateX(-6px);} to{opacity:1;transform:none;} }
.acc-row.revealed { animation: rowIn 0.22s ease both; }

/* ─── DETAIL PANEL ─── */
.rm-detail {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.42s cubic-bezier(0.4,0,0.2,1);
}
.rm-det-in {
  padding: 18px 22px 22px;
  border-top: 1px solid rgba(15,21,116,0.07);
  background: rgba(15,21,116,0.025);
}

/* breadcrumb */
.rm-breadcrumb {
  display: flex; align-items: center; gap: 6px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--ink4); margin-bottom: 10px;
}
.rm-breadcrumb-sep { opacity: 0.4; }

.rm-det-title {
  font-family: var(--display);
  font-size: 17px; font-weight: 700; color: var(--navy);
  margin-bottom: 8px; letter-spacing: -0.01em;
}
.rm-det-desc {
  font-size: 13px; color: var(--ink2);
  line-height: 1.7; margin-bottom: 16px;
  max-width: 680px;
}

/* two-col layout for topics + skills */
.rm-det-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media(max-width:640px){ .rm-det-cols { grid-template-columns: 1fr; } }

.rm-det-col-label {
  font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--ink4); margin-bottom: 8px;
}
.topic-chips { display: flex; flex-wrap: wrap; gap: 5px; }
.topic-chip {
  font-size: 11.5px; font-weight: 600;
  padding: 4px 12px; border-radius: var(--r-pill); border: 1.5px solid;
  transition: transform 0.15s;
}
.topic-chip:hover { transform: translateY(-1px); }

.skills-list { display: flex; flex-direction: column; gap: 5px; }
.skill-row {
  display: flex; align-items: flex-start; gap: 8px;
  background: #fff;
  border: 1px solid rgba(15,21,116,0.07);
  border-radius: 9px; padding: 7px 11px;
  font-size: 12px; color: var(--ink2); line-height: 1.45;
  transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
  box-shadow: 0 1px 3px rgba(15,21,116,0.04);
}
.skill-row:hover { border-color: rgba(15,21,116,0.15); box-shadow: var(--sh-sm); transform: translateX(2px); }
.skill-bullet {
  width: 5px; height: 5px; border-radius: 50%;
  flex-shrink: 0; margin-top: 5px;
}

/* ─── FOOTER ─── */
.footer {
  margin-top: 60px;
  padding-top: 20px;
  border-top: 1px solid rgba(15,21,116,0.08);
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 12px;
}
.foot-l { font-size: 12px; color: var(--ink4); font-weight: 500; }
.foot-codes { display: flex; gap: 5px; flex-wrap: wrap; }
.foot-code {
  font-family: var(--mono); font-size: 10px; font-weight: 600;
  padding: 3px 9px; border-radius: 6px; letter-spacing: 0.05em;
}

/* ─── ANIMATIONS ─── */
@keyframes fadeUp { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }
.hero    { animation: fadeUp 0.55s ease both 0.06s; }
.filter-strip { animation: fadeUp 0.45s ease both 0.16s; }
.rm-item { animation: fadeUp 0.4s ease both; }
.rm-item:nth-child(2) { animation-delay:0.10s; }
.rm-item:nth-child(3) { animation-delay:0.15s; }
.rm-item:nth-child(4) { animation-delay:0.20s; }
.rm-item:nth-child(5) { animation-delay:0.25s; }
.rm-item:nth-child(6) { animation-delay:0.30s; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<!-- BG LAYERS -->
<div class="bg-canvas"></div>
<div class="dot-grid"></div>
<div class="sym-layer" id="symLayer"></div>

<div class="page">

function launchSymbols(){
  const layer = document.getElementById('symLayer');
  function add(startFraction){
    const el = document.createElement('div');
    el.className = 'sym';
    el.textContent = SYMS[Math.floor(Math.random()*SYMS.length)];
    const sz = Math.random()*22+11;
    const dur = Math.random()*16+12;
    // startFraction: 0=top, 1=bottom; convert to top% (symbols move upward)
    const startTop = startFraction !== undefined
      ? startFraction * 100
      : Math.random() * 110; // random spread 0–110vh (some slightly below fold)
    el.style.cssText = `
      left:${Math.random()*100}%;
      top:${startTop}%;
      font-size:${sz}px;
      color:${COLS[Math.floor(Math.random()*COLS.length)]};
      opacity:0;
      animation-duration:${dur}s;
      animation-delay:0s;
    `;
    layer.appendChild(el);
    setTimeout(()=>el.remove(), (dur+1)*1000);
  }
  // Initial burst: spread across entire page at random heights
  for(let i=0;i<22;i++) setTimeout(()=>add(Math.random()), i*200);
  // Ongoing: new ones from random heights
  setInterval(()=>add(Math.random()*1.1), 1200);
}
launchSymbols();

/* ── BUILD FILTER STRIP ── */
function buildFilters(){
  const strip = document.getElementById('filterStrip');

  const allBtn = mkBtn('all','All Domains',null,true);
  strip.appendChild(allBtn);

  DS.forEach(d=>{
    strip.appendChild(mkBtn(d.id, d.id+' · '+d.name, d, false));
  });
}
function mkBtn(id, label, d, on){
  const b = document.createElement('button');
  b.className = 'fs-btn' + (on?' on':'');
  b.dataset.fid = id;
  if(d) b.innerHTML = `<span class="fs-dot" style="background:${d.c}"></span>${d.name}<span class="fs-count" style="background:${d.cl};color:${d.c}">${d.outcomes.length}</span>`;
  else  b.innerHTML = `All Domains <span class="fs-count">${DS.reduce((a,x)=>a+x.outcomes.length,0)}</span>`;
  if(on){ b.style.background='var(--navy)'; b.style.color='#fff'; b.style.borderColor='var(--navy)'; }
  b.onclick = ()=>setFilter(id, b, d);
  return b;
}
function setFilter(id, btn, d){
  document.querySelectorAll('.fs-btn').forEach(b=>{
    b.classList.remove('on');
    b.style.background=''; b.style.color=''; b.style.borderColor='';
  });
  btn.classList.add('on');
  if(id==='all'){ btn.style.background='var(--navy)'; btn.style.color='#fff'; btn.style.borderColor='var(--navy)'; }
  else          { btn.style.background=d.c; btn.style.color='#fff'; btn.style.borderColor=d.c; }
  document.querySelectorAll('.rm-item').forEach(el=>{
    el.style.display = (id==='all'||el.dataset.did===id) ? '' : 'none';
  });
}

/* ── BUILD ACCORDION ── */
function buildRoadmap(){
  const wrap = document.getElementById('roadmap');
  DS.forEach((d, di)=>{
    const item = document.createElement('div');
    item.className = 'rm-item';
    item.dataset.did = d.id;
    item.style.animationDelay = (0.08 + di*0.07)+'s';

    // node circle
    const node = document.createElement('div');
    node.className = 'rm-node';
    node.textContent = d.icon;
    const nodeBg = d.id==='RP' ? '#FFF5F2' :
                   d.id==='NS' ? '#F3F0FF' :
                   d.id==='EE' ? '#FFFBF0' :
                   d.id==='G'  ? '#F0F6FF' :
                                 '#FFF0F5';
    node.style.cssText = `background:${nodeBg};color:${d.c};border-color:${d.c};
      box-shadow:0 0 0 4px ${nodeBg}, 0px 8px 24px rgba(0,0,0,0.12), 0 0 0 1px ${d.cb};
      font-family:'Inconsolata',monospace;font-weight:900;`;
    node.onclick = ()=>toggleCard(d.id);

    // card shell
    const card = document.createElement('div');
    card.className = 'rm-card';
    card.id = 'card-'+d.id;

    // coloured top stripe
    const stripe = document.createElement('div');
    stripe.className = 'rm-card-stripe';
    stripe.style.background = d.cStripe;

    // domain header row
    const hdr = document.createElement('div');
    hdr.className = 'rm-card-hdr';
    hdr.innerHTML = `
      <div class="rm-card-icon" style="background:${d.cl};color:${d.c}">${d.icon}</div>
      <div class="rm-card-info">
        <div class="rm-card-name">${d.name}</div>
        <div class="rm-card-desc">${d.desc}</div>
      </div>
      <div class="rm-card-right">
        <span class="rm-code" style="color:${d.c};background:${d.cl};border-color:${d.cb}">${d.code}</span>
        <span class="rm-ct">${d.outcomes.length} outcomes</span>
        <div class="chev">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="2,3.5 5.5,7 9,3.5"/>
          </svg>
        </div>
      </div>`;
    hdr.onclick = ()=>toggleCard(d.id);

    // accordion outcomes wrapper
    const accWrap = document.createElement('div');
    accWrap.className = 'acc-outcomes-wrap';
    accWrap.id = 'aw-'+d.id;

    const accInner = document.createElement('div');
    accInner.className = 'acc-outcomes-inner';
    accInner.id = 'ai-'+d.id;

    // build each outcome row
    d.outcomes.forEach((o, oi)=>{
      const row = document.createElement('div');
      row.className = 'acc-row';
      row.id = `ar-${d.id}-${oi}`;

      const left = document.createElement('div');
      left.className = 'acc-row-left';
      left.innerHTML = `
        <span class="acc-row-num" style="background:${d.cl};color:${d.c}">${String(oi+1).padStart(2,'0')}</span>
        <span class="acc-row-title">${o.t}</span>`;

      const tog = document.createElement('div');
      tog.className = 'acc-row-toggle';

      row.appendChild(left);
      row.appendChild(tog);
      row.onclick = ()=>toggleRow(d.id, oi);

      // detail panel for this row
      const det = document.createElement('div');
      det.className = 'acc-det';
      det.id = `ad-${d.id}-${oi}`;

      accInner.appendChild(row);
      accInner.appendChild(det);
    });

    accWrap.appendChild(accInner);
    card.appendChild(stripe);
    card.appendChild(hdr);
    card.appendChild(accWrap);
    item.appendChild(node);
    item.appendChild(card);
    wrap.appendChild(item);
  });

  // Open all domains on load with a small stagger between each
  DS.forEach((d, di)=>{
    setTimeout(()=>toggleCard(d.id), 80 + di * 60);
  });
}

function toggleCard(did){
  const card = document.getElementById('card-'+did);
  const aw   = document.getElementById('aw-'+did);
  const ai   = document.getElementById('ai-'+did);
  const isOpen = card.classList.contains('open');

  if(isOpen){
    card.classList.remove('open');
    aw.style.maxHeight = '0';
  } else {
    card.classList.add('open');
    // stagger row entrance
    const rows = ai.querySelectorAll('.acc-row');
    rows.forEach((r,i)=>{ r.classList.remove('revealed'); setTimeout(()=>r.classList.add('revealed'), 30+i*28); });
    aw.style.maxHeight = '0';
    requestAnimationFrame(()=>{ aw.style.maxHeight = ai.scrollHeight + 2000 + 'px'; });
  }
}

function toggleRow(did, oi){
  const key  = `${did}-${oi}`;
  const row  = document.getElementById(`ar-${did}-${oi}`);
  const det  = document.getElementById(`ad-${did}-${oi}`);
  const aw   = document.getElementById('aw-'+did);
  const ai   = document.getElementById('ai-'+did);
  const d    = DS.find(x=>x.id===did);
  const o    = d.outcomes[oi];
  const isOpen = row.classList.contains('is-open');

  if(isOpen){
    row.classList.remove('is-open');
    det.style.maxHeight = '0';
    setTimeout(()=>{ aw.style.maxHeight = ai.scrollHeight + 'px'; }, 40);
    return;
  }

  row.classList.add('is-open');

  // build detail if not yet built
  if(!det.querySelector('.acc-det-in')){
    const topicChips = o.tags.map(t=>
      `<span class="topic-chip" style="color:${d.c};background:${d.cl};border-color:${d.cb}">${t}</span>`
    ).join('');
    const skillRows = o.skills.map(s=>
      `<div class="skill-row"><span class="skill-bullet" style="background:${d.c}"></span>${s}</div>`
    ).join('');
    det.innerHTML = `
      <div class="acc-det-in">
        <div class="rm-breadcrumb">
          <span style="color:${d.c};font-weight:700">${d.code}</span>
          <span class="rm-breadcrumb-sep">›</span>
          <span>Outcome ${String(oi+1).padStart(2,'0')}</span>
        </div>
        <div class="rm-det-title" style="color:${d.c}">${o.t}</div>
        <div class="acc-det-desc">${o.d}</div>
        <div class="acc-det-cols">
          <div>
            <div class="acc-det-col-label">Topics covered</div>
            <div class="topic-chips">${topicChips}</div>
          </div>
          <div>
            <div class="acc-det-col-label">Specific skills</div>
            <div class="skills-list">${skillRows}</div>
          </div>
        </div>
      </div>`;
  }

  det.style.maxHeight = '0';
  requestAnimationFrame(()=>{
    det.style.maxHeight = det.scrollHeight + 24 + 'px';
    setTimeout(()=>{ aw.style.maxHeight = ai.scrollHeight + 600 + 'px'; }, 50);
  });
}

/* ── FOOTER ── */
function buildFooter(){
  const fc = document.getElementById('footCodes');
  DS.forEach(d=>{
    const s = document.createElement('span');
    s.className = 'foot-code';
    s.textContent = d.code;
    s.style.cssText = `color:${d.c};background:${d.cl};border:1.5px solid ${d.cb}`;
    fc.appendChild(s);
  });
}

buildFilters();
buildRoadmap();
buildFooter();
</script>
</body>
</html>
